<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MQTT 调试工具</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Toast 通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 导航栏 -->
<nav class="nav">
  <div class="nav-left">
    <div class="nav-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      </svg>
      MQTT 调试
    </div>

    <!-- 连接按钮组 -->
    <div class="conn-group">
      <button class="conn-btn connect-btn" id="connectBtn" onclick="quickConnect()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
        </svg>
        连接
      </button>
      <button class="conn-btn disconnect-btn hidden" id="disconnectBtn" onclick="disconnect()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        断开
      </button>

      <!-- 连接信息（可点击编辑） -->
      <div class="conn-info-display" id="connInfoDisplay" onclick="editBrokerInline()">
        <span class="conn-info-placeholder" id="connInfoText">wss://broker.emqx.io:8084/mqtt</span>
      </div>
      <!-- 内联编辑输入框（隐藏） -->
      <input type="text" class="conn-info-input hidden" id="connInfoInput" placeholder="wss://broker.emqx.io:8084/mqtt">
    </div>
  </div>

  <div class="nav-right">
    <!-- 清空按钮 -->
    <button class="nav-btn" onclick="clearMessages()" title="清空消息">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </button>
    <!-- 设置按钮 -->
    <button class="nav-btn settings-btn" onclick="showSettings()" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>
</nav>

<!-- 主内容 -->
<div class="main-container">
  <!-- 左侧订阅栏 -->
  <aside class="sidebar">
    <button class="add-sub-btn" onclick="showSubModal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      添加订阅
    </button>
    <div class="sub-list" id="subList"></div>
  </aside>

  <!-- 右侧消息区 -->
  <main class="message-area">
    <!-- 消息过滤标签 -->
    <div class="msg-tabs">
      <div class="msg-tab-list">
        <button class="msg-tab active" onclick="setFilter('all', event)">全部</button>
        <button class="msg-tab" onclick="setFilter('received', event)">已接收</button>
        <button class="msg-tab" onclick="setFilter('sent', event)">已发送</button>
      </div>
      <div class="msg-count">
        <span id="msgCountText">0 条</span>
      </div>
    </div>

    <!-- 消息列表 -->
    <div class="msg-list" id="msgList">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <p>暂无消息</p>
      </div>
    </div>

    <!-- 底部输入区 - 固定在底部 -->
    <div class="input-area">
      <!-- 第一行：快捷输入栏 -->
      <div class="input-toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">Topic</span>
          <input type="text" class="toolbar-topic" id="pubTopic" placeholder="输入主题..." value="hbj/test">
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group" data-tooltip="QoS 0: 至多一次↵发送一次，不确认↵↵QoS 1: 至少一次↵确认送达，可能重复↵↵QoS 2: 恰好一次↵确认且不重复">
          <span class="toolbar-label">QoS</span>
          <select class="toolbar-select" id="qosSelect">
            <option value="0">0</option>
            <option value="1" selected>1</option>
            <option value="2">2</option>
          </select>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group" data-tooltip="开启后，服务器将保留↵最新一条消息↵新客户端连接时可立即收到">
          <span class="toolbar-label">Retain</span>
          <div class="toggle-switch" id="retainToggle" onclick="toggleRetain()"></div>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group" data-tooltip="开启后，消息内容↵将以 JSON 格式美化输出显示">
          <span class="toolbar-label">JSON</span>
          <div class="toggle-switch active" id="jsonToggle" onclick="toggleJson()"></div>
        </div>

        <button class="send-btn" onclick="publish()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          发送
        </button>
      </div>

      <!-- 第二行：消息内容 -->
      <div class="input-row">
        <textarea class="input-content" id="pubContent" placeholder="输入消息内容... (Ctrl+Enter 发送)">{"status":"ok","value":123}</textarea>
      </div>
    </div>
  </main>
</div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="hideSettings()">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <div class="settings-header">
      <h2>连接设置</h2>
      <button class="settings-close" onclick="hideSettings()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-title">基础配置</div>
        
        <div class="settings-row" data-tooltip="Broker 地址，支持 ws:// 或 wss:// 协议↵例如: wss://broker.emqx.io:8084/mqtt">
          <label>连接地址</label>
          <input type="text" id="cfgBroker" placeholder="wss://broker.emqx.io:8084/mqtt">
        </div>

        <div class="settings-row-inline">
          <div class="settings-row">
            <label>超时 (ms)</label>
            <input type="text" id="cfgTimeout" value="4000">
          </div>
          <div class="settings-row">
            <label>心跳 (s)</label>
            <input type="text" id="cfgKeepalive" value="60">
          </div>
        </div>

        <div class="settings-row">
          <label>用户名</label>
          <input type="text" id="cfgUsername" placeholder="可选">
        </div>

        <div class="settings-row">
          <label>密码</label>
          <input type="password" id="cfgPassword" placeholder="可选">
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">遗嘱消息 (Will)</div>
        
        <div class="settings-row" data-tooltip="当客户端异常断开时↵服务器自动发送的消息">
          <label>遗嘱主题</label>
          <input type="text" id="cfgWillTopic" placeholder="可选">
        </div>

        <div class="settings-row">
          <label>遗嘱消息</label>
          <input type="text" id="cfgWillMessage" placeholder="可选">
        </div>

        <div class="settings-row-inline">
          <div class="settings-row">
            <label>遗嘱 QoS</label>
            <select id="cfgWillQos">
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
            </select>
          </div>
          <div class="settings-row">
            <label>遗嘱 Retain</label>
            <select id="cfgWillRetain">
              <option value="false">否</option>
              <option value="true">是</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn-disconnect" onclick="disconnect()">断开</button>
      <button class="btn-connect" onclick="connect()">连接</button>
    </div>
  </div>
</div>

<!-- 添加订阅弹窗 -->
<div class="modal-overlay" id="subModal">
  <div class="modal">
    <h3>添加订阅</h3>
    
    <div class="modal-row" data-tooltip="支持通配符:↵+ 单层通配符↵# 多层通配符（需在最后）">
      <label>订阅主题</label>
      <input type="text" id="modalTopic" placeholder="输入主题，支持 + #">
    </div>
    
    <div class="modal-row">
      <label>订阅别名</label>
      <input type="text" id="modalAlias" placeholder="可选，用于显示名称">
    </div>
    
    <div class="modal-row">
      <label>标记颜色</label>
      <div class="color-picker">
        <div class="color-option selected" data-color="#e0f7f4" style="background: #e0f7f4;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#e3f2fd" style="background: #e3f2fd;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#fff3e0" style="background: #fff3e0;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#f3e5f5" style="background: #f3e5f5;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#ffebee" style="background: #ffebee;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#e8f5e9" style="background: #e8f5e9;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#fce4ec" style="background: #fce4ec;" onclick="selectColor(this)"></div>
        <div class="color-option" data-color="#fff8e1" style="background: #fff8e1;" onclick="selectColor(this)"></div>
      </div>
    </div>
    
    <div class="modal-row-inline">
      <div class="modal-row-half">
        <label>QoS 等级</label>
        <select id="modalQos">
          <option value="0">0 - 至多一次</option>
          <option value="1" selected>1 - 至少一次</option>
          <option value="2">2 - 恰好一次</option>
        </select>
      </div>
      <div class="modal-row-half">
        <label>订阅标识符</label>
        <input type="text" id="modalSubId" placeholder="可选，数字">
      </div>
    </div>
    
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="hideSubModal()">取消</button>
      <button class="modal-btn primary" onclick="confirmSubscribe()">订阅</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<script src="script.js"></script>

</body>
</html>
